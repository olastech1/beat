<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password — BeatMarket</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', sans-serif;
      background: #08070f;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }
    body::before {
      content: '';
      position: fixed; inset: 0;
      background: radial-gradient(ellipse 60% 40% at 50% 0%, rgba(124,58,237,0.15) 0%, transparent 70%);
      pointer-events: none;
    }
    .card {
      position: relative; z-index: 1;
      width: 100%; max-width: 380px;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 20px;
      padding: 2.5rem 2rem;
      box-shadow: 0 2px 40px rgba(0,0,0,0.5);
    }
    .logo {
      display: flex; align-items: center; gap: 0.6rem;
      justify-content: center; margin-bottom: 2rem;
      font-size: 1.2rem; font-weight: 800; color: #fff;
    }
    .logo-icon {
      width: 38px; height: 38px;
      background: linear-gradient(135deg, #7C3AED, #6366F1);
      border-radius: 10px; display: grid; place-items: center;
      font-size: 1.1rem;
    }
    .logo span { color: #a78bfa; }
    h1 { font-size: 1.4rem; font-weight: 700; color: #fff; text-align: center; margin-bottom: 0.4rem; }
    .sub { font-size: 0.82rem; color: rgba(255,255,255,0.4); text-align: center; margin-bottom: 2rem; }
    .fgroup { margin-bottom: 1.1rem; }
    label { display: block; font-size: 0.75rem; font-weight: 500; color: rgba(255,255,255,0.45); margin-bottom: 0.4rem; text-transform: uppercase; letter-spacing: 0.04em; }
    .input-wrap { position: relative; }
    .input-wrap input {
      width: 100%; padding: 0.72rem 2.5rem 0.72rem 1rem;
      background: rgba(255,255,255,0.05); border: 1.5px solid rgba(255,255,255,0.09);
      border-radius: 10px; color: #fff; font-family: inherit; font-size: 0.88rem;
      outline: none; transition: border-color 0.2s;
    }
    .input-wrap input:focus { border-color: rgba(124,58,237,0.6); background: rgba(124,58,237,0.05); }
    .pw-toggle {
      position: absolute; right: 10px; top: 50%; transform: translateY(-50%);
      background: none; border: none; cursor: pointer; font-size: 0.85rem; opacity: 0.4;
    }
    .pw-toggle:hover { opacity: 0.8; }
    .strength-bar { height: 3px; border-radius: 2px; margin-top: 0.4rem; background: rgba(255,255,255,0.06); overflow: hidden; }
    .strength-fill { height: 100%; border-radius: 2px; width: 0; transition: width 0.3s, background 0.3s; }
    .btn {
      width: 100%; padding: 0.82rem; border: none; border-radius: 10px; cursor: pointer;
      background: linear-gradient(135deg, #7C3AED, #6366F1);
      color: #fff; font-family: inherit; font-size: 0.9rem; font-weight: 600;
      box-shadow: 0 4px 20px rgba(124,58,237,0.35);
      transition: all 0.2s; margin-top: 0.5rem;
    }
    .btn:hover { transform: translateY(-1px); box-shadow: 0 6px 28px rgba(124,58,237,0.5); }
    .btn:disabled { opacity: 0.55; cursor: not-allowed; transform: none !important; }
    .msg {
      display: none; border-radius: 8px; padding: 0.7rem 0.9rem;
      font-size: 0.82rem; margin-bottom: 1rem; text-align: center;
    }
    .msg.error { background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.25); color: #fca5a5; display: block; }
    .msg.success { background: rgba(16,185,129,0.1); border: 1px solid rgba(16,185,129,0.25); color: #6ee7b7; display: block; }
    .back { display: block; text-align: center; margin-top: 1.5rem; font-size: 0.78rem; color: rgba(255,255,255,0.3); text-decoration: none; }
    .back:hover { color: #a78bfa; }
    #loading-state { text-align: center; padding: 1rem 0; font-size: 0.85rem; color: rgba(255,255,255,0.4); }
  </style>
</head>
<body>
<div class="card">
  <div class="logo">
    <div class="logo-icon">🎧</div>
    Beat<span>Market</span>
  </div>

  <div id="loading-state">⏳ Verifying reset link…</div>

  <div id="form-state" style="display:none">
    <h1>Set New Password</h1>
    <p class="sub" id="reset-email-label">Enter a new password for your account</p>

    <div class="msg" id="msg"></div>

    <form id="reset-form" novalidate>
      <div class="fgroup">
        <label for="new-pw">New Password</label>
        <div class="input-wrap">
          <input type="password" id="new-pw" placeholder="Min 8 characters" required autocomplete="new-password">
          <button type="button" class="pw-toggle" onclick="toggle('new-pw', this)">👁</button>
        </div>
        <div class="strength-bar"><div class="strength-fill" id="strength-fill"></div></div>
      </div>
      <div class="fgroup">
        <label for="confirm-pw">Confirm Password</label>
        <div class="input-wrap">
          <input type="password" id="confirm-pw" placeholder="Repeat password" required autocomplete="new-password">
          <button type="button" class="pw-toggle" onclick="toggle('confirm-pw', this)">👁</button>
        </div>
      </div>
      <button type="submit" class="btn" id="submit-btn">Update Password</button>
    </form>
  </div>

  <div id="error-state" style="display:none">
    <h1 style="color:#fca5a5;text-align:center">Link Invalid</h1>
    <p class="sub">This reset link has expired or already been used.</p>
    <a href="login.html" class="btn" style="display:block;text-align:center;text-decoration:none;margin-top:1rem">Back to Login</a>
  </div>

  <a href="login.html" class="back">← Back to Login</a>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.49.4/dist/umd/supabase.js"></script>
<script src="js/supabase.js"></script>
<script>
function toggle(id, btn) {
  const el = document.getElementById(id);
  el.type = el.type === 'password' ? 'text' : 'password';
  btn.textContent = el.type === 'password' ? '👁' : '🙈';
}

function showMsg(text, type) {
  const el = document.getElementById('msg');
  el.textContent = text;
  el.className = 'msg ' + type;
}

// Password strength meter
document.getElementById('new-pw').addEventListener('input', function() {
  const v = this.value;
  const fill = document.getElementById('strength-fill');
  let strength = 0;
  if (v.length >= 8) strength++;
  if (/[A-Z]/.test(v)) strength++;
  if (/[0-9]/.test(v)) strength++;
  if (/[^A-Za-z0-9]/.test(v)) strength++;
  const colors = ['', '#ef4444', '#f59e0b', '#10b981', '#7C3AED'];
  const widths  = ['0%', '25%', '50%', '75%', '100%'];
  fill.style.width = widths[strength];
  fill.style.background = colors[strength] || '';
});

// Parse hash tokens from URL
(async function init() {
  const hash = window.location.hash.substring(1);
  const params = new URLSearchParams(hash);
  const accessToken  = params.get('access_token');
  const refreshToken = params.get('refresh_token');
  const type         = params.get('type');

  if (!accessToken || type !== 'recovery') {
    document.getElementById('loading-state').style.display = 'none';
    document.getElementById('error-state').style.display  = 'block';
    return;
  }

  try {
    // Set the session from the recovery tokens
    const { data, error } = await supabase.auth.setSession({
      access_token:  accessToken,
      refresh_token: refreshToken,
    });

    if (error || !data.user) {
      document.getElementById('loading-state').style.display = 'none';
      document.getElementById('error-state').style.display  = 'block';
      return;
    }

    // Show the form
    document.getElementById('loading-state').style.display = 'none';
    document.getElementById('form-state').style.display    = 'block';
    document.getElementById('reset-email-label').textContent =
      'Setting new password for ' + data.user.email;

  } catch(e) {
    document.getElementById('loading-state').style.display = 'none';
    document.getElementById('error-state').style.display  = 'block';
  }
})();

// Submit new password
document.getElementById('reset-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const pw      = document.getElementById('new-pw').value;
  const confirm = document.getElementById('confirm-pw').value;
  const btn     = document.getElementById('submit-btn');

  if (pw.length < 8) { showMsg('Password must be at least 8 characters.', 'error'); return; }
  if (pw !== confirm) { showMsg('Passwords do not match.', 'error'); return; }

  btn.disabled = true;
  btn.textContent = 'Updating…';

  const { error } = await supabase.auth.updateUser({ password: pw });

  if (error) {
    showMsg(error.message || 'Failed to update password.', 'error');
    btn.disabled = false;
    btn.textContent = 'Update Password';
    return;
  }

  showMsg('✅ Password updated! Redirecting to login…', 'success');

  // Get user role to redirect to proper login
  let redirectUrl = 'login.html';
  try {
    const { data } = await supabase.from('profiles').select('role').eq('id', (await supabase.auth.getUser()).data.user.id).single();
    if (data?.role === 'admin') redirectUrl = 'admin-login.html';
  } catch(_) {}

  await supabase.auth.signOut();
  setTimeout(() => { window.location.href = redirectUrl; }, 2000);
});
</script>
</body>
</html>
