<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BeatMarket</title>
  <meta name="description" content="BeatMarket — Premium beats marketplace">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/auth.css">
  <style>
    .page-hero {
      background: linear-gradient(135deg, rgba(124,58,237,0.15) 0%, transparent 60%),
                  radial-gradient(ellipse 80% 50% at 80% 20%, rgba(124,58,237,0.08) 0%, transparent 70%),
                  var(--bg-primary);
      padding: 5rem 2rem 3rem;
      text-align: center;
      border-bottom: 1px solid var(--border);
    }
    .page-hero-tag {
      display: inline-block;
      padding: 4px 14px;
      border-radius: var(--radius-pill);
      background: var(--purple-dim);
      border: 1px solid rgba(124,58,237,0.3);
      font-size: 0.75rem;
      font-weight: 700;
      color: var(--purple-light);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 1rem;
    }
    .page-hero h1 {
      font-size: clamp(2rem, 5vw, 3.5rem);
      font-weight: 900;
      letter-spacing: -1.5px;
      color: var(--text-primary);
      margin-bottom: 0.75rem;
    }
    .page-hero-sub {
      font-size: 1.05rem;
      color: var(--text-secondary);
      max-width: 560px;
      margin: 0 auto;
    }

    /* Content */
    .page-content {
      max-width: 820px;
      margin: 0 auto;
      padding: 3rem 2rem 5rem;
      color: var(--text-secondary);
      line-height: 1.8;
    }
    .page-content h2 {
      font-size: 1.4rem;
      font-weight: 800;
      color: var(--text-primary);
      margin: 2.5rem 0 0.75rem;
      padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }
    .page-content h2:first-child { margin-top: 0; }
    .page-content h3 {
      font-size: 1.05rem;
      font-weight: 700;
      color: var(--text-primary);
      margin: 1.5rem 0 0.4rem;
    }
    .page-content p { margin-bottom: 1rem; }
    .page-content ul, .page-content ol {
      padding-left: 1.5rem;
      margin-bottom: 1rem;
    }
    .page-content li { margin-bottom: 0.35rem; }
    .page-content a { color: var(--purple-light); }
    .page-content a:hover { text-decoration: underline; }
    .page-content strong { color: var(--text-primary); font-weight: 700; }
    .page-content hr {
      border: none;
      border-top: 1px solid var(--border);
      margin: 2rem 0;
    }

    /* Pricing cards */
    .pricing-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 1.25rem;
      margin: 1.5rem 0;
    }
    .pricing-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 1.5rem;
      transition: border-color var(--transition), transform var(--transition);
    }
    .pricing-card:hover { border-color: var(--purple); transform: translateY(-2px); }
    .pricing-card.featured { border-color: var(--purple); background: var(--purple-dim); }
    .pricing-type { font-size: 0.75rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; color: var(--purple-light); margin-bottom: 0.5rem; }
    .pricing-price { font-size: 2rem; font-weight: 900; letter-spacing: -1px; color: var(--text-primary); margin-bottom: 0.25rem; }
    .pricing-label { font-size: 0.82rem; color: var(--text-muted); margin-bottom: 1rem; }
    .pricing-features { list-style: none; padding: 0; font-size: 0.83rem; }
    .pricing-features li { padding: 0.3rem 0; color: var(--text-secondary); }
    .pricing-features li::before { content: "✓ "; color: var(--purple-light); font-weight: 700; }

    /* FAQ accordions */
    .faq-item {
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      margin-bottom: 0.75rem;
      overflow: hidden;
    }
    .faq-question {
      width: 100%;
      text-align: left;
      padding: 1rem 1.25rem;
      font-size: 0.95rem;
      font-weight: 600;
      color: var(--text-primary);
      background: var(--bg-card);
      display: flex;
      justify-content: space-between;
      align-items: center;
      cursor: pointer;
      transition: background var(--transition);
    }
    .faq-question:hover { background: var(--bg-glass-light); }
    .faq-question .faq-icon { font-size: 1.1rem; transition: transform 0.3s; flex-shrink: 0; }
    .faq-item.open .faq-icon { transform: rotate(45deg); }
    .faq-answer {
      display: none;
      padding: 1rem 1.25rem 1.25rem;
      font-size: 0.88rem;
      color: var(--text-secondary);
      line-height: 1.7;
      border-top: 1px solid var(--border);
      background: var(--bg-secondary);
    }
    .faq-item.open .faq-answer { display: block; }

    /* Loading skeleton */
    .page-skeleton {
      display: flex;
      flex-direction: column;
      gap: 1rem;
      padding: 3rem 2rem;
      max-width: 820px;
      margin: 0 auto;
    }
    .skel-line {
      height: 14px;
      border-radius: 6px;
      background: linear-gradient(90deg, var(--bg-card) 25%, var(--bg-glass-light) 50%, var(--bg-card) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
    }
    .skel-line.wide { width: 100%; }
    .skel-line.med  { width: 75%; }
    .skel-line.sm   { width: 50%; }
    .skel-line.h3   { height: 22px; }

    @media (max-width: 600px) {
      .page-hero { padding: 4rem 1.25rem 2rem; }
      .page-content { padding: 2rem 1.25rem 4rem; }
      .pricing-grid { grid-template-columns: 1fr 1fr; }
    }
  </style>
</head>
<body>

<!-- NAVBAR (same as index) -->
<nav id="navbar" role="navigation" aria-label="Main navigation">
  <a href="index.html" class="nav-logo" aria-label="BeatMarket Home">
    <div class="nav-logo-icon" aria-hidden="true">🎧</div>

<!-- PAGE HERO -->
<div class="page-hero" id="page-hero">
  <div class="page-hero-tag" id="page-tag">Loading…</div>
  <h1 id="page-title">Loading…</h1>
  <p class="page-hero-sub" id="page-subtitle"></p>
</div>

<!-- PAGE CONTENT -->
<div id="page-body">
  <div class="page-skeleton">
    <div class="skel-line h3 sm"></div>
    <div class="skel-line wide"></div>
    <div class="skel-line wide"></div>
    <div class="skel-line med"></div>
    <div class="skel-line h3 sm" style="margin-top:1rem"></div>
    <div class="skel-line wide"></div>
    <div class="skel-line wide"></div>
    <div class="skel-line sm"></div>
  </div>
</div>

<!-- FOOTER -->
<footer role="contentinfo">
  <div class="footer-logo">Beat<span>Market</span></div>
  <nav class="footer-links" aria-label="Footer navigation">

    <a href="page.html?p=blog">Blog</a>

<script>
// ── Default page content ──────────────────────────────────────────────
const PAGE_DEFAULTS = {
  about: {
    tag: "Our Story",
    title: "About BeatMarket",
    subtitle: "The premier marketplace connecting producers and artists worldwide.",
    content: `
      <h2>Who We Are</h2>
      <p>BeatMarket is a premium digital marketplace where music producers sell high-quality beats to artists, rappers, singers, and content creators around the world. We bridge the gap between talented producers and the artists who need their sound.</p>

      <h2>Our Mission</h2>
      <p>Our mission is simple: <strong>empower creators</strong>. Whether you're a producer looking to monetize your craft or an artist searching for the perfect sound for your next hit, BeatMarket is built for you.</p>

      <h2>For Artists</h2>
      <p>Browse thousands of beats, preview full tracks, and license exactly what you need. Our clear license tiers mean no legal confusion — just music.</p>

    subtitle: "Tips, news, and insights for producers and artists.",
    content: `

      <h2>What to Expect</h2>
      <ul>
        <li><strong>Producer Tips</strong> — Mixing, mastering, and marketing your beats</li>

        <li><strong>Industry News</strong> — What's trending in the music world</li>
        <li><strong>Platform Updates</strong> — New features and improvements</li>
      </ul>

      <p>Stay tuned — follow us on social media for updates when new articles drop.</p>
    `
  },
  pricing: {
    tag: "License Types",
    title: "Pricing & Licenses",
    subtitle: "Flexible licensing for every artist and every budget.",
    content: `
      <h2>License Tiers</h2>

            <li>Must credit producer</li>
          </ul>
        </div>
        <div class="pricing-card">
          <div class="pricing-type">Unlimited</div>
          <div class="pricing-price">$–</div>
          <div class="pricing-label">Unlimited Lease</div>
          <ul class="pricing-features">
            <li>WAV + MP3 included</li>
            <li>Unlimited streams</li>
            <li>Non-exclusive</li>
            <li>Must credit producer</li>
          </ul>
        </div>
        <div class="pricing-card">
          <div class="pricing-type">Exclusive</div>
          <div class="pricing-price">$–</div>
          <div class="pricing-label">Full Ownership</div>
          <ul class="pricing-features">
            <li>WAV + Stems included</li>
            <li>Unlimited everything</li>
            <li>Beat removed from store</li>
            <li>Full copyright transfer</li>
          </ul>
        </div>
      </div>

      <h2>Platform Fee</h2>
      <p>BeatMarket charges a 20% platform commission on all sales. Producers receive 80% of every transaction, paid out weekly.</p>

      <h2>Questions?</h2>
      <p>Contact us at <a href="mailto:hello@beatmarket.com">hello@beatmarket.com</a> for custom licensing inquiries.</p>
    `
  },
  faq: {
    tag: "Help Center",
    title: "Frequently Asked Questions",
    subtitle: "Everything you need to know about BeatMarket.",
    content: `
      <div class="faq-item">
        <button class="faq-question">How do I buy a beat? <span class="faq-icon">+</span></button>
        <div class="faq-answer">Browse beats, click the play button to preview, then click "Add" to add to your cart. Choose your license type at checkout and complete payment via Stripe. Your files are delivered instantly.</div>
      </div>
      <div class="faq-item">
        <button class="faq-question">What's the difference between lease and exclusive? <span class="faq-icon">+</span></button>
        <div class="faq-answer">A <strong>lease</strong> lets multiple artists use the beat within set limits (streams, distribution). An <strong>exclusive</strong> means only you own the beat — it's removed from the store and you get full rights.</div>
      </div>
      <div class="faq-item">
        <button class="faq-question">Can I sell my own beats on BeatMarket? <span class="faq-icon">+</span></button>
        <div class="faq-answer">Yes! Sign up as a Seller, complete your profile, and upload your beats. Each beat goes through a quick review process before going live. You keep 80% of every sale.</div>
      </div>
      <div class="faq-item">
        <button class="faq-question">How do I get paid? <span class="faq-icon">+</span></button>
        <div class="faq-answer">Payouts are processed weekly via Stripe to your connected bank or debit card. Minimum withdrawal is $100. Earnings show in your Seller Dashboard under Earnings.</div>
      </div>
      <div class="faq-item">
        <button class="faq-question">What audio formats do I receive? <span class="faq-icon">+</span></button>
        <div class="faq-answer">Basic licenses include MP3. Premium and above include WAV + MP3. Exclusive licenses include full stems and WAV files in addition to MP3.</div>
      </div>
      <div class="faq-item">
        <button class="faq-question">Can I use a beat for commercial music videos? <span class="faq-icon">+</span></button>
        <div class="faq-answer">Premium and Unlimited leases allow music videos up to a certain view count. Exclusive licenses have no restrictions. Check each license's specific terms before purchasing.</div>
      </div>
      <div class="faq-item">
        <button class="faq-question">What if I have a dispute? <span class="faq-icon">+</span></button>
        <div class="faq-answer">Contact our support team at <a href="mailto:hello@beatmarket.com">hello@beatmarket.com</a>. All transactions are protected and we mediate disputes fairly.</div>
      </div>
    `
  },
  terms: {
    tag: "Legal",
    title: "Terms of Service",
    subtitle: "Please read these terms carefully before using BeatMarket.",
    content: `
      <p><strong>Last updated:</strong> January 1, 2026</p>

      <h2>1. Acceptance of Terms</h2>
      <p>By accessing or using BeatMarket ("the Platform"), you agree to be bound by these Terms of Service. If you do not agree, do not use the Platform.</p>

      <h2>2. User Accounts</h2>
      <p>You must be 18 years or older to create an account. You are responsible for maintaining the confidentiality of your credentials and for all activity under your account.</p>

      <h2>3. Seller Terms</h2>
      <p>Sellers must own all rights to uploaded content. By uploading, you grant BeatMarket a non-exclusive license to display and sell your beats. Sellers receive 80% of all completed sales. BeatMarket retains a 20% platform commission.</p>

      <h2>4. Buyer Terms</h2>
      <p>Purchasing a beat grants you a license according to the tier selected at checkout. Licenses are non-transferable. Exclusive licenses transfer beat copyright to the buyer only after full payment.</p>

      <h2>5. Prohibited Content</h2>
      <p>You may not upload content that infringes third-party intellectual property, contains illegal material, or violates any applicable law. BeatMarket reserves the right to remove content and suspend accounts without notice.</p>

      <h2>6. Payments & Refunds</h2>
      <p>All payments are processed by Stripe. Due to the digital nature of our products, all sales are final. Refunds are issued only at BeatMarket's sole discretion in cases of technical failure.</p>

      <h2>7. Limitation of Liability</h2>
      <p>BeatMarket is not liable for indirect, incidental, or consequential damages arising from your use of the Platform.</p>

      <h2>8. Changes to Terms</h2>
      <p>We may update these Terms at any time. Continued use of the Platform after changes constitutes acceptance.</p>

      <h2>9. Contact</h2>
      <p>Questions about these Terms? Email <a href="mailto:legal@beatmarket.com">legal@beatmarket.com</a>.</p>
    `
  },
  privacy: {
    tag: "Privacy",
    title: "Privacy Policy",
    subtitle: "How BeatMarket collects, uses, and protects your data.",
    content: `
      <p><strong>Last updated:</strong> January 1, 2026</p>

      <h2>1. Information We Collect</h2>
      <ul>
        <li><strong>Account data:</strong> name, email address, and role when you register</li>
        <li><strong>Transaction data:</strong> purchase history, license types, and amounts</li>
        <li><strong>Usage data:</strong> beat plays, searches, and page visits</li>
        <li><strong>Payment data:</strong> handled entirely by Stripe — we never store card numbers</li>
      </ul>

      <h2>2. How We Use Your Data</h2>
      <ul>
        <li>To provide and improve our services</li>
        <li>To process payments and deliver purchases</li>
        <li>To send transactional emails (receipts, password resets)</li>
        <li>To calculate seller payouts and analytics</li>
      </ul>

      <h2>3. Data Sharing</h2>
      <p>We do not sell your personal data. We share data only with:</p>
      <ul>
        <li><strong>Stripe</strong> — for payment processing</li>
        <li><strong>Supabase</strong> — for secure database hosting</li>
      </ul>

      <h2>4. Cookies</h2>
      <p>We use session cookies to keep you logged in. We do not use third-party advertising cookies.</p>

      <h2>5. Your Rights</h2>
      <p>You may request deletion of your account and data at any time by emailing <a href="mailto:privacy@beatmarket.com">privacy@beatmarket.com</a>. We will process all requests within 30 days.</p>

      <h2>6. Security</h2>
      <p>We use industry-standard encryption and security practices. All data in transit is protected by TLS. Passwords are never stored in plain text.</p>

      <h2>7. Contact</h2>
      <p>Privacy questions? Email <a href="mailto:privacy@beatmarket.com">privacy@beatmarket.com</a>.</p>
    `
  }
};

// ── Load page ─────────────────────────────────────────────────────────
const slug = new URLSearchParams(location.search).get("p") || "about";
const defaults = PAGE_DEFAULTS[slug] || PAGE_DEFAULTS.about;

// Set <title> and <meta description> immediately
document.title = defaults.title + " — BeatMarket";

// Try to load from Supabase, fall back to defaults
async function loadPage() {
  let data = null;

  if (window._supabaseReady) {
    try {
      const res = await supabase.from("site_pages").select("*").eq("slug", slug).single();
      if (res.data) data = res.data;
    } catch(e) { /* fallback */ }
  }

  const title    = data?.title    || defaults.title;
  const subtitle = data?.subtitle || defaults.subtitle;
  const tag      = data?.tag      || defaults.tag;
  const content  = data?.content  || defaults.content;
  const copy     = data?.copyright || "© 2026 BeatMarket. All rights reserved.";

  document.getElementById("page-tag").textContent   = tag;
  document.getElementById("page-title").textContent = title;
  document.getElementById("page-subtitle").textContent = subtitle;
  document.getElementById("footer-copy").textContent = copy;
  document.title = title + " — BeatMarket";

  document.getElementById("page-body").innerHTML = `<div class="page-content">${Sanitize.html(content)}</div>`;

  // Activate FAQ accordions
  document.querySelectorAll(".faq-question").forEach(btn => {
    btn.addEventListener("click", () => {
      btn.closest(".faq-item").classList.toggle("open");
    });
  });
}

loadPage();
</script>
