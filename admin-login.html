<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login — BeatMarket</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      background: #08070f;
      color: #e2e8f0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      position: relative;
      overflow: hidden;
    }

    /* Background layers */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background:
        radial-gradient(ellipse 60% 50% at 50% 0%, rgba(217,119,6,0.12) 0%, transparent 70%),
        radial-gradient(ellipse 40% 40% at 80% 90%, rgba(180,83,9,0.08) 0%, transparent 60%);
      pointer-events: none;
    }
    body::after {
      content: '';
      position: fixed; inset: 0;
      background-image: radial-gradient(circle, rgba(255,255,255,0.025) 1px, transparent 1px);
      background-size: 36px 36px;
      pointer-events: none;
    }

    /* Restricted banner */
    .restricted-bar {
      position: fixed; top: 0; left: 0; right: 0;
      background: rgba(217,119,6,0.12);
      border-bottom: 1px solid rgba(217,119,6,0.25);
      padding: 0.45rem 1rem;
      text-align: center;
      font-size: 0.72rem;
      color: rgba(251,191,36,0.6);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      z-index: 10;
    }
    .restricted-bar span { color: #fbbf24; font-weight: 600; }

    /* Card */
    .admin-card {
      position: relative; z-index: 1;
      width: 100%; max-width: 400px;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(217,119,6,0.2);
      border-radius: 20px;
      padding: 2.5rem 2rem;
      box-shadow: 0 0 60px rgba(217,119,6,0.08), 0 2px 40px rgba(0,0,0,0.6);
      backdrop-filter: blur(12px);
    }

    /* Shield header */
    .shield-header {
      text-align: center;
      margin-bottom: 2.2rem;
    }
    .shield-icon {
      width: 72px; height: 72px;
      margin: 0 auto 1rem;
      background: radial-gradient(135deg, rgba(217,119,6,0.25), rgba(180,83,9,0.15));
      border: 1.5px solid rgba(217,119,6,0.35);
      border-radius: 20px;
      display: grid; place-items: center;
      font-size: 2rem;
      box-shadow: 0 0 30px rgba(217,119,6,0.2);
      position: relative;
    }
    .shield-icon::after {
      content: '';
      position: absolute; inset: -3px;
      border-radius: 22px;
      border: 1px solid rgba(217,119,6,0.1);
    }
    .shield-header h1 {
      font-size: 1.4rem; font-weight: 700;
      color: #fff; letter-spacing: -0.3px;
      margin-bottom: 0.3rem;
    }
    .shield-header p { font-size: 0.8rem; color: rgba(255,255,255,0.35); }

    /* Access level badge */
    .access-badge {
      display: flex; align-items: center; justify-content: center; gap: 0.5rem;
      margin-bottom: 2rem;
      padding: 0.5rem 0.9rem;
      background: rgba(217,119,6,0.07);
      border: 1px solid rgba(217,119,6,0.18);
      border-radius: 8px;
      font-size: 0.75rem; color: rgba(251,191,36,0.7);
    }
    .access-badge::before {
      content: '';
      width: 6px; height: 6px; border-radius: 50%;
      background: #f59e0b;
      box-shadow: 0 0 6px #f59e0b;
      animation: pulse-dot 2s infinite;
    }
    @keyframes pulse-dot {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    /* Form fields */
    .fgroup { margin-bottom: 1.1rem; }
    .fgroup label {
      display: block; font-size: 0.75rem; font-weight: 500;
      color: rgba(255,255,255,0.45); margin-bottom: 0.45rem; letter-spacing: 0.04em;
      text-transform: uppercase;
    }
    .input-wrap { position: relative; }
    .input-icon {
      position: absolute; left: 13px; top: 50%; transform: translateY(-50%);
      font-size: 0.85rem; opacity: 0.45; pointer-events: none;
    }
    .input-wrap input {
      width: 100%;
      padding: 0.72rem 1rem 0.72rem 2.55rem;
      background: rgba(255,255,255,0.04);
      border: 1.5px solid rgba(255,255,255,0.08);
      border-radius: 10px;
      color: #fff; font-family: inherit; font-size: 0.88rem;
      transition: border-color 0.2s, background 0.2s;
      outline: none;
    }
    .input-wrap input::placeholder { color: rgba(255,255,255,0.18); }
    .input-wrap input:focus {
      border-color: rgba(217,119,6,0.5);
      background: rgba(217,119,6,0.05);
    }
    .pw-toggle {
      position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
      background: none; border: none; cursor: pointer;
      font-size: 0.85rem; opacity: 0.35; transition: opacity 0.2s;
    }
    .pw-toggle:hover { opacity: 0.75; }

    /* Error */
    .auth-error {
      display: none;
      background: rgba(239,68,68,0.1);
      border: 1px solid rgba(239,68,68,0.25);
      border-radius: 8px; padding: 0.6rem 0.85rem;
      font-size: 0.8rem; color: #fca5a5;
      margin-bottom: 1rem;
    }
    .auth-error.visible { display: block; }

    /* Submit */
    .btn-submit {
      width: 100%; padding: 0.82rem;
      background: linear-gradient(135deg, #D97706, #B45309);
      border: none; border-radius: 10px; cursor: pointer;
      color: #fff; font-family: inherit; font-size: 0.9rem; font-weight: 600;
      transition: all 0.2s;
      box-shadow: 0 4px 20px rgba(217,119,6,0.3);
      margin-bottom: 1rem;
    }
    .btn-submit:hover { transform: translateY(-1px); box-shadow: 0 6px 28px rgba(217,119,6,0.45); }
    .btn-submit:disabled { opacity: 0.55; cursor: not-allowed; transform: none !important; }

    /* Footer links */
    .card-footer {
      display: flex; justify-content: space-between; align-items: center;
      padding-top: 1.2rem;
      border-top: 1px solid rgba(255,255,255,0.06);
      font-size: 0.75rem; color: rgba(255,255,255,0.3);
    }
    .card-footer a { color: rgba(251,191,36,0.5); text-decoration: none; transition: color 0.2s; }
    .card-footer a:hover { color: #fbbf24; }

    /* Bottom brand */
    .bottom-brand {
      margin-top: 2rem;
      display: flex; align-items: center; gap: 0.5rem;
      color: rgba(255,255,255,0.2); font-size: 0.75rem;
      position: relative; z-index: 1;
    }
    .bottom-brand-icon {
      width: 24px; height: 24px;
      background: rgba(124,58,237,0.3);
      border-radius: 6px; display: grid; place-items: center; font-size: 0.75rem;
    }
    .bottom-brand strong { color: rgba(255,255,255,0.35); }
  </style>
</head>
<body>

<div class="restricted-bar">🔒 <span>Restricted Area</span> — Authorized Personnel Only</div>

<div class="admin-card">
  <div class="shield-header">
    <div class="shield-icon">🛡️</div>
    <h1>Admin Portal</h1>
    <p>BeatMarket Control Center</p>
  </div>

  <div class="access-badge">Access Level: Administrator</div>

  <form id="admin-login-form" novalidate>
    <div class="fgroup">
      <label for="admin-email">Admin Email</label>
      <div class="input-wrap">
        <span class="input-icon">✉️</span>
        <input type="email" id="admin-email" placeholder="admin@beatmarket.com" autocomplete="email" required>
      </div>
    </div>

    <div class="fgroup">
      <label for="admin-pw">Password</label>
      <div class="input-wrap">
        <span class="input-icon">🔑</span>
        <input type="password" id="admin-pw" placeholder="••••••••" autocomplete="current-password" required>
        <button type="button" class="pw-toggle" data-target="admin-pw">👁</button>
      </div>
    </div>

    <div class="auth-error" id="admin-login-error" role="alert" aria-live="polite"></div>

    <button type="submit" class="btn-submit" id="admin-submit-btn">Access Admin Panel →</button>
  </form>

  <div class="card-footer">
    <a href="login.html">← User Login</a>
    <a href="index.html">View Store</a>
  </div>
</div>

<div class="bottom-brand">
  <div class="bottom-brand-icon">🎧</div>
  <span>Beat<strong>Market</strong> — Admin Portal</span>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.49.4/dist/umd/supabase.js"></script>
<script src="https://cdn.jsdelivr.net/npm/dompurify@3.1.6/dist/purify.min.js"></script>
<script src="js/supabase.js"></script>
<script src="js/auth.js"></script>
<script src="js/api.js"></script>
<script src="js/security.js"></script>
<script>
(function () {
  // Redirect if already logged in as admin
  const session = Auth.getSession();
  if (session && session.role === "admin") {
    window.location.href = "admin.html";
    return;
  }

  // Password visibility toggle
  document.querySelector(".pw-toggle").addEventListener("click", function () {
    const input = document.getElementById(this.dataset.target);
    input.type = input.type === "password" ? "text" : "password";
    this.textContent = input.type === "password" ? "👁" : "🙈";
  });

  function showError(msg) {
    const el = document.getElementById("admin-login-error");
    el.textContent = msg;
    el.classList.add("visible");
    setTimeout(() => el.classList.remove("visible"), 6000);
  }

  function setLoading(loading) {
    const btn = document.getElementById("admin-submit-btn");
    btn.disabled = loading;
    btn.textContent = loading ? "Verifying…" : "Access Admin Panel →";
  }

  document.getElementById("admin-login-form").addEventListener("submit", async (e) => {
    e.preventDefault();
    const email = document.getElementById("admin-email").value.trim().toLowerCase();
    const pw    = document.getElementById("admin-pw").value;

    if (!email || !pw) { showError("Please enter your email and password."); return; }

    // ── Rate limit check ─────────────────────────────────────
    const lockMsg = RateLimit.check("admin_login");
    if (lockMsg) { showError(lockMsg); return; }

    setLoading(true);
    const res = await Auth.login(email, pw, "admin");
    setLoading(false);

    if (!res.ok) {
      const warn = RateLimit.record("admin_login", false);
      showError((warn ? warn + "\n" : "") + (res.error || "Invalid credentials or insufficient permissions."));
      return;
    }

    RateLimit.record("admin_login", true); // reset on success
    window.location.href = "admin.html";
  });
})();
</script>
</body>
</html>
